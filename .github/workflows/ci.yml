name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowos_ci
          POSTGRES_USER: flowos
          POSTGRES_PASSWORD: flowos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: flowos_ci
      POSTGRES_USER: flowos
      POSTGRES_PASSWORD: flowos_ci
      GLADIUS_SOLO_EMAIL: test@flowos.dev
      GLADIUS_SOLO_PASSWORD: testpassword123
      GLADIUS_SOLO_NAME: Test User
      API_URL: http://localhost:3000
      # No ANTHROPIC_API_KEY, GLADIUS_API_KEY, or GLADIUS_AGENT_USER_ID: intentional.
      # AI-dependent tests self-skip on a missing key; the two endpoint tests that
      # use search-translate self-gate on `translator_available`. Bearer-auth MCP
      # tests self-skip when GLADIUS_API_KEY is unset. See exclusion note below for
      # the one Bearer test that does NOT self-skip.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate ephemeral secrets
        run: |
          echo "SESSION_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
          echo "GLADIUS_ENCRYPTION_KEY=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Apply base schema
        run: |
          psql "postgresql://flowos:flowos_ci@localhost:5432/flowos_ci" -f db/init/blueprint_schema.sql
          psql "postgresql://flowos:flowos_ci@localhost:5432/flowos_ci" -f db/init/runtime_schema.sql
        # NOTE: db/init/01_schemas.sql is NOT used here — it \i-includes container
        # paths (docker-entrypoint-initdb.d) that don't exist against a plain
        # service container. blueprint_schema.sql + runtime_schema.sql are the
        # equivalent base schema, applied directly via psql -f.

      - name: Run migrations
        run: node db/migrate.js

      - name: Lint
        run: npx eslint .

      - name: Seed solo dataset
        run: npm run seed

      - name: Start server
        run: |
          node api/server.js > server.log 2>&1 &
          echo $! > server.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/auth/status > /dev/null; then
              echo "Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become ready in time"
          cat server.log
          exit 1

      # ---------------------------------------------------------------------
      # INTERIM ALLOWLIST — DEBT.26611
      #
      # This runs the isolation-clean subset of tests/*.test.js, one file at
      # a time (never batched — a batched run races on the shared `testOrg`
      # slug generation across files). The excluded files below are NOT
      # skipped because they're unimportant; they're excluded because they
      # fail on a freshly-seeded CI database for reasons unrelated to the
      # code they're testing:
      #
      #   Hardcoded dogfood-only actor/user IDs (309, 112, 8) that only exist
      #   on the live dogfood DB, not a fresh seed (FK violation on insert):
      #     - context-assembler.test.js
      #     - exit-criteria-context-entry.test.js
      #     - exit-criteria-waiver.test.js
      #     - exit-criteria-waivers.test.js
      #     - playbook-executor.test.js
      #     - staleness-detector.test.js
      #     - search-translate.test.js
      #
      #   Ambient/global DB-state assumptions (expect a pre-existing work
      #   item, or a specific hardcoded work-item id, that only exist on a
      #   long-lived dogfood DB, not a fresh seed):
      #     - events-integration.test.js
      #     - events-processor.test.js
      #     - notifications-integration.test.js
      #
      #   Missing self-skip guard: asserts Bearer auth succeeds without
      #   checking whether GLADIUS_API_KEY is configured (unlike its sibling
      #   MCP test files, which correctly self-skip when unset):
      #     - mcp-playbook-read.test.js
      #
      #   Real product bug, unrelated to CI/test isolation: the notifications
      #   subscriber's hardcoded HANDLED event-type set (runtime/subscribers/
      #   notifications.js) is missing `work_item.context_entry_added`,
      #   out of sync with the seeded notification_defaults:
      #     - notifications-fanout.test.js
      #
      # All 12 are tracked by DEBT.26841 (test-isolation defect). When that
      # item lands, delete this allowlist and run the full suite instead.
      # ---------------------------------------------------------------------
      - name: Run integration tests (isolation-clean allowlist)
        run: |
          set -e
          FILES="
            tests/attachments-api.test.js
            tests/bulk-ops.test.js
            tests/comments-api.test.js
            tests/context-api.test.js
            tests/decision-resolution.test.js
            tests/delivery-worker-tick.test.js
            tests/dev-tools-gate.test.js
            tests/mcp-attribution.test.js
            tests/mcp-available-transitions.test.js
            tests/mcp-field-writes.test.js
            tests/mcp-link-items.test.js
            tests/mcp-two-writers.test.js
            tests/mcp-write-org-context.test.js
            tests/notifications-ratelimit.test.js
            tests/parse-agent-entries.test.js
            tests/saved-filters-api.test.js
            tests/search-api.test.js
            tests/search-index.test.js
            tests/session-context-api.test.js
            tests/single-org-mode.test.js
            tests/work-item-history.test.js
            tests/workflow-api.test.js
          "
          for f in $FILES; do
            echo "::group::$f"
            node --test --test-force-exit "$f"
            echo "::endgroup::"
          done

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then kill -9 "$(cat server.pid)" || true; fi
