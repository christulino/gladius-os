version: "3.9"

# Gladius — Local Development Environment
# Runs PostgreSQL
#
# Start:   docker compose up -d
# Stop:    docker compose down
# Reset:   docker compose down -v   (WARNING: destroys all data)
# Logs:    docker compose logs -f [service]

services:

  # ===========================================================================
  # POSTGRESQL
  # Blueprint + Runtime schemas
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: gladius-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       flowos
      POSTGRES_USER:     flowos
      POSTGRES_PASSWORD: flowos_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d   # runs SQL files on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowos -d flowos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
