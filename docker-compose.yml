version: "3.9"

# Gladius — Local Development Environment
# Runs PostgreSQL and MinIO (S3-compatible object storage for evidence files)
#
# Start:   docker compose up -d
# Stop:    docker compose down
# Reset:   docker compose down -v   (WARNING: destroys all data)
# Logs:    docker compose logs -f [service]

services:

  # ===========================================================================
  # POSTGRESQL
  # Blueprint + Runtime schemas
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: gladius-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       flowos
      POSTGRES_USER:     flowos
      POSTGRES_PASSWORD: flowos_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d   # runs SQL files on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowos -d flowos"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ===========================================================================
  # MINIO
  # S3-compatible object storage for evidence files (photos, attachments)
  # Browser UI: http://localhost:9001  (user: flowos, password: flowos_dev_secret)
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: gladius-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     flowos
      MINIO_ROOT_PASSWORD: flowos_dev_secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Browser console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
